<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Greptile PR Badges</title>
    <style>
      :root {
        background: #fff8df;
        color: #211b16;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-width: 280px;
      }

      main {
        display: grid;
        gap: 12px;
        padding: 16px;
      }

      h1 {
        font-size: 17px;
        line-height: 1.2;
        margin: 0;
      }

      p {
        color: rgba(33, 27, 22, 0.72);
        font-size: 13px;
        line-height: 1.45;
        margin: 0;
      }

      button {
        background: #c83138;
        border: 1px solid #211b16;
        border-radius: 6px;
        box-shadow: 3px 3px 0 #211b16;
        color: #fff8df;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
        min-height: 38px;
        padding: 8px 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Greptile PR Badges</h1>
      <p>Show Greptile scores on GitHub pull request lists.</p>
      <button id="open-options" type="button">Open settings</button>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
